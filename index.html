<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #202124; font-family: 'Consolas', monospace; overflow: hidden; color: white; }
        
        /* Interface Fake do Google */
        #google-ui { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; padding-top: 15vh;
            z-index: 50; cursor: text;
        }
        .logo-text { font-size: 90px; font-weight: bold; letter-spacing: -5px; margin-bottom: 30px; user-select: none; }
        .logo-text span:nth-child(1) {color: #4285f4} .logo-text span:nth-child(2) {color: #ea4335}
        .logo-text span:nth-child(3) {color: #fbbc05} .logo-text span:nth-child(4) {color: #4285f4}
        .logo-text span:nth-child(5) {color: #34a853} .logo-text span:nth-child(6) {color: #ea4335}
        .search-bar { width: 90%; max-width: 584px; height: 46px; border: 1px solid #5f6368; border-radius: 24px; display: flex; align-items: center; padding: 0 20px; color: #9aa0a6; background: transparent; }

        /* Terminal Hacker */
        #terminal-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0d0f12; color: #2ecc71; padding: 30px; z-index: 100; font-size: 16px; line-height: 1.5;
        }
        .red { color: #ff4d4d; font-weight: bold; }
        .blue { color: #3498db; }

        /* Jumpscare */
        #jumpscare { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 200; justify-content: center; align-items: center; 
        }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="google-ui">
        <div class="logo-text"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
        <div class="search-bar">Pesquise no Google ou digite uma URL</div>
    </div>

    <div id="terminal-screen">
        <div id="log"></div>
    </div>

    <div id="jumpscare">
        <video id="v" playsinline src="video.mp4"></video>
    </div>

    <script>
        const video = document.getElementById('v');
        const googleUI = document.getElementById('google-ui');
        const terminal = document.getElementById('terminal-screen');
        const log = document.getElementById('log');
        let audioUnlocked = false;
        let isTriggered = false;
        let userData = {};

        // Busca informações do alvo em segundo plano
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                userData = {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    isp: data.org,
                    browser: navigator.userAgent.split(') ')[1] || "Generic Browser"
                };
            });

        function unlockAudio() {
            if (!audioUnlocked) {
                video.play().then(() => {
                    video.pause();
                    video.currentTime = 0;
                    audioUnlocked = true;
                }).catch(() => {});
            }
        }

        // Gatilho: Mouse saindo da tela (Exit Intent)
        document.addEventListener('mouseleave', (e) => {
            if (e.clientY < 0 && !isTriggered) {
                startScare();
            }
        });

        async function startScare() {
            isTriggered = true;
            googleUI.style.display = "none";
            terminal.style.display = "block";

            const lines = [
                `> [SYS] <span class="blue">EXIT_INTENT_DETECTED</span>`,
                `> [SYS] <span class="blue">TARGET_IP:</span> ${userData.ip || '192.168.0.1'}`,
                `> [SYS] <span class="blue">LOCATION:</span> ${userData.city || 'Desconhecido'}, ${userData.region || 'XX'}`,
                `> [SYS] <span class="blue">ISP:</span> ${userData.isp || 'Telecom'}`,
                `> [SYS] <span class="blue">AGENT:</span> ${userData.browser}`,
                `> <span class="red">[!] UPLOADING DATA TO REMOTE SERVER...</span>`,
                `> <span class="red">[!] EXECUTING CORE_OVERLOAD.EXE...</span>`
            ];

            for (let line of lines) {
                log.innerHTML += line + "<br>";
                // Velocidade absurda para assustar
                await new Promise(r => setTimeout(r, 200)); 
            }

            boom();
        }

        function boom() {
            document.getElementById('jumpscare').style.display = "flex";
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            video.muted = false;
            video.volume = 1.0;
            video.play();
            setTimeout(() => { location.reload(); }, 6000);
        }

        // Bloqueia o clique direito para o alvo não desconfiar
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
